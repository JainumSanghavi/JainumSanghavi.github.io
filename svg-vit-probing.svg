<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Layerwise probing of a Vision Transformer reveals a spatial hierarchy: boundary structure peaks at layer 5, per-patch depth at layer 8, both collapse at the final classification layer" class="w-full h-full">
  <defs>
    <linearGradient id="vit-depth-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="currentColor" stop-opacity="0.05"/>
      <stop offset="55%" stop-color="currentColor" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="currentColor" stop-opacity="0.88"/>
    </linearGradient>
  </defs>
  <style>
    .vit-frame { fill: none; stroke: currentColor; opacity: 0.1; stroke-width: 0.6; }
    .vit-cell { fill: none; stroke: currentColor; stroke-width: 0.7; opacity: 0.18; }
    .vit-header { fill: currentColor; font-family: system-ui, sans-serif; font-size: 8.5px; font-weight: 600; letter-spacing: 0.22em; opacity: 0.55; text-anchor: middle; }
    .vit-axis-lbl { fill: currentColor; font-family: 'JetBrains Mono', monospace; font-size: 7.5px; opacity: 0.35; text-anchor: middle; }
    .vit-peak-lbl { fill: currentColor; font-family: 'JetBrains Mono', monospace; font-size: 7.5px; font-weight: 500; letter-spacing: 0.1em; opacity: 0; text-anchor: middle; }
    .vit-caption { fill: currentColor; font-family: 'JetBrains Mono', monospace; font-size: 7px; opacity: 0.34; text-anchor: middle; }
    .vit-divider { stroke: currentColor; stroke-width: 0.5; opacity: 0.12; stroke-dasharray: 2 3; }
    .vit-ring { fill: none; stroke: currentColor; opacity: 0.05; stroke-width: 0.5; }
    .vit-bdry-cell { fill: currentColor; opacity: 0; }
    .vit-depth-band { fill: url(#vit-depth-grad); opacity: 0; }
    .vit-collapse-band { fill: currentColor; opacity: 0; }
    @keyframes vit-bdry-pulse { 0%, 8% { opacity: 0; } 18%, 32% { opacity: 0.55; } 42%, 100% { opacity: 0; } }
    @keyframes vit-bdry-peak { 0%, 8% { opacity: 0; } 18%, 32% { opacity: 0.92; } 42%, 100% { opacity: 0; } }
    @keyframes vit-depth-pulse { 0%, 38% { opacity: 0; } 48%, 64% { opacity: 0.5; } 74%, 100% { opacity: 0; } }
    @keyframes vit-depth-peak { 0%, 38% { opacity: 0; } 48%, 64% { opacity: 0.9; } 74%, 100% { opacity: 0; } }
    @keyframes vit-collapse-anim { 0%, 76% { opacity: 0; } 80% { opacity: 0.5; } 86% { opacity: 0.18; } 92%, 100% { opacity: 0; } }
    @keyframes vit-bdry-lbl-anim { 0%, 14% { opacity: 0; } 22%, 32% { opacity: 0.7; } 40%, 100% { opacity: 0; } }
    @keyframes vit-depth-lbl-anim { 0%, 44% { opacity: 0; } 52%, 64% { opacity: 0.7; } 72%, 100% { opacity: 0; } }
    @keyframes vit-coll-lbl-anim { 0%, 76% { opacity: 0; } 82%, 90% { opacity: 0.6; } 96%, 100% { opacity: 0; } }
    .vit-bdry { animation: vit-bdry-pulse 6s ease-in-out infinite; }
    .vit-bdry-pk { animation: vit-bdry-peak 6s ease-in-out infinite; }
    .vit-depth { animation: vit-depth-pulse 6s ease-in-out infinite; }
    .vit-depth-pk { animation: vit-depth-peak 6s ease-in-out infinite; }
    .vit-coll { animation: vit-collapse-anim 6s ease-in-out infinite; }
    .vit-lbl-b { animation: vit-bdry-lbl-anim 6s ease-in-out infinite; }
    .vit-lbl-d { animation: vit-depth-lbl-anim 6s ease-in-out infinite; }
    .vit-lbl-c { animation: vit-coll-lbl-anim 6s ease-in-out infinite; }
  </style>

  <!-- Header -->
  <text class="vit-header" x="200" y="22">VIT-B/16 &#xb7; LAYERWISE PROBE</text>
  <line class="vit-divider" x1="60" y1="30" x2="340" y2="30"/>

  <!-- Decorative rings -->
  <circle class="vit-ring" cx="200" cy="92" r="98"/>
  <circle class="vit-ring" cx="200" cy="92" r="72"/>

  <!-- 13 layer columns: frames + 4 cells each -->
  <g><rect class="vit-frame" x="59" y="58" width="16" height="66" rx="2"/><rect class="vit-cell" x="60" y="60" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="60" y="76" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="60" y="92" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="60" y="108" width="14" height="14" rx="1.5"/></g>
  <g><rect class="vit-frame" x="81" y="58" width="16" height="66" rx="2"/><rect class="vit-cell" x="82" y="60" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="82" y="76" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="82" y="92" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="82" y="108" width="14" height="14" rx="1.5"/></g>
  <g><rect class="vit-frame" x="103" y="58" width="16" height="66" rx="2"/><rect class="vit-cell" x="104" y="60" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="104" y="76" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="104" y="92" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="104" y="108" width="14" height="14" rx="1.5"/></g>
  <g><rect class="vit-frame" x="125" y="58" width="16" height="66" rx="2"/><rect class="vit-cell" x="126" y="60" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="126" y="76" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="126" y="92" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="126" y="108" width="14" height="14" rx="1.5"/></g>
  <g><rect class="vit-frame" x="147" y="58" width="16" height="66" rx="2"/><rect class="vit-cell" x="148" y="60" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="148" y="76" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="148" y="92" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="148" y="108" width="14" height="14" rx="1.5"/></g>
  <g><rect class="vit-frame" x="169" y="58" width="16" height="66" rx="2"/><rect class="vit-cell" x="170" y="60" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="170" y="76" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="170" y="92" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="170" y="108" width="14" height="14" rx="1.5"/></g>
  <g><rect class="vit-frame" x="191" y="58" width="16" height="66" rx="2"/><rect class="vit-cell" x="192" y="60" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="192" y="76" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="192" y="92" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="192" y="108" width="14" height="14" rx="1.5"/></g>
  <g><rect class="vit-frame" x="213" y="58" width="16" height="66" rx="2"/><rect class="vit-cell" x="214" y="60" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="214" y="76" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="214" y="92" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="214" y="108" width="14" height="14" rx="1.5"/></g>
  <g><rect class="vit-frame" x="235" y="58" width="16" height="66" rx="2"/><rect class="vit-cell" x="236" y="60" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="236" y="76" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="236" y="92" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="236" y="108" width="14" height="14" rx="1.5"/></g>
  <g><rect class="vit-frame" x="257" y="58" width="16" height="66" rx="2"/><rect class="vit-cell" x="258" y="60" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="258" y="76" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="258" y="92" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="258" y="108" width="14" height="14" rx="1.5"/></g>
  <g><rect class="vit-frame" x="279" y="58" width="16" height="66" rx="2"/><rect class="vit-cell" x="280" y="60" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="280" y="76" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="280" y="92" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="280" y="108" width="14" height="14" rx="1.5"/></g>
  <g><rect class="vit-frame" x="301" y="58" width="16" height="66" rx="2"/><rect class="vit-cell" x="302" y="60" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="302" y="76" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="302" y="92" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="302" y="108" width="14" height="14" rx="1.5"/></g>
  <g><rect class="vit-frame" x="323" y="58" width="16" height="66" rx="2"/><rect class="vit-cell" x="324" y="60" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="324" y="76" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="324" y="92" width="14" height="14" rx="1.5"/><rect class="vit-cell" x="324" y="108" width="14" height="14" rx="1.5"/></g>

  <!-- Boundary highlights: cells 1+2 of L1-L7. L5 and L6 are peak intensity. -->
  <rect class="vit-bdry-cell vit-bdry"    x="82"  y="76" width="14" height="14" rx="1.5"/>
  <rect class="vit-bdry-cell vit-bdry"    x="82"  y="92" width="14" height="14" rx="1.5"/>
  <rect class="vit-bdry-cell vit-bdry"    x="104" y="76" width="14" height="14" rx="1.5"/>
  <rect class="vit-bdry-cell vit-bdry"    x="104" y="92" width="14" height="14" rx="1.5"/>
  <rect class="vit-bdry-cell vit-bdry"    x="126" y="76" width="14" height="14" rx="1.5"/>
  <rect class="vit-bdry-cell vit-bdry"    x="126" y="92" width="14" height="14" rx="1.5"/>
  <rect class="vit-bdry-cell vit-bdry"    x="148" y="76" width="14" height="14" rx="1.5"/>
  <rect class="vit-bdry-cell vit-bdry"    x="148" y="92" width="14" height="14" rx="1.5"/>
  <rect class="vit-bdry-cell vit-bdry-pk" x="170" y="76" width="14" height="14" rx="1.5"/>
  <rect class="vit-bdry-cell vit-bdry-pk" x="170" y="92" width="14" height="14" rx="1.5"/>
  <rect class="vit-bdry-cell vit-bdry-pk" x="192" y="76" width="14" height="14" rx="1.5"/>
  <rect class="vit-bdry-cell vit-bdry-pk" x="192" y="92" width="14" height="14" rx="1.5"/>
  <rect class="vit-bdry-cell vit-bdry"    x="214" y="76" width="14" height="14" rx="1.5"/>
  <rect class="vit-bdry-cell vit-bdry"    x="214" y="92" width="14" height="14" rx="1.5"/>

  <!-- Depth gradient bands: L4-L10. L8 is peak intensity. -->
  <rect class="vit-depth-band vit-depth"    x="148" y="60" width="14" height="62" rx="1.5"/>
  <rect class="vit-depth-band vit-depth"    x="170" y="60" width="14" height="62" rx="1.5"/>
  <rect class="vit-depth-band vit-depth"    x="192" y="60" width="14" height="62" rx="1.5"/>
  <rect class="vit-depth-band vit-depth"    x="214" y="60" width="14" height="62" rx="1.5"/>
  <rect class="vit-depth-band vit-depth-pk" x="236" y="60" width="14" height="62" rx="1.5"/>
  <rect class="vit-depth-band vit-depth"    x="258" y="60" width="14" height="62" rx="1.5"/>
  <rect class="vit-depth-band vit-depth"    x="280" y="60" width="14" height="62" rx="1.5"/>

  <!-- L12 collapse pulse -->
  <rect class="vit-collapse-band vit-coll" x="324" y="60" width="14" height="62" rx="1.5"/>

  <!-- Peak labels -->
  <text class="vit-peak-lbl vit-lbl-b" x="188" y="50">BOUNDARY &#xb7; L5&#x2013;6</text>
  <text class="vit-peak-lbl vit-lbl-d" x="243" y="50">DEPTH &#xb7; L8</text>
  <text class="vit-peak-lbl vit-lbl-c" x="324" y="50">COLLAPSE</text>

  <!-- Bottom axis -->
  <line class="vit-divider" x1="60" y1="132" x2="340" y2="132"/>
  <text class="vit-axis-lbl" x="67"  y="146">L0</text>
  <text class="vit-axis-lbl" x="133" y="146">L3</text>
  <text class="vit-axis-lbl" x="199" y="146">L6</text>
  <text class="vit-axis-lbl" x="243" y="146">L8</text>
  <text class="vit-axis-lbl" x="331" y="146">L12</text>

  <!-- Captions -->
  <text class="vit-caption" x="200" y="178">linear probes &#xb7; per-patch hidden states &#xb7; frozen ViT-B/16</text>
  <text class="vit-caption" x="200" y="194">AP 0.833 &#xb7; MAE 0.0875 &#xb7; 1 direction in 768 carries depth</text>
</svg>
